name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\SafeSeal.sln

      - name: Publish (win-x64)
        run: >-
          dotnet publish .\SafeSeal.App\SafeSeal.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:DebugType=None
          -p:DebugSymbols=false
          -o .\artifacts\release\publish\win-x64

      - name: Package release artifact
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag) -or $tag -eq "refs/heads/main") {
            $tag = "manual-${{ github.run_number }}"
          }

          $publishDir = Resolve-Path ".\artifacts\release\publish\win-x64"
          $stageRoot = Resolve-Path ".\artifacts\release"
          $packageDir = Join-Path $stageRoot "SafeSeal-$tag-win-x64"
          $zipPath = Join-Path $stageRoot "SafeSeal-$tag-win-x64.zip"
          $shaPath = "$zipPath.sha256"

          if (Test-Path $packageDir) { Remove-Item $packageDir -Recurse -Force }
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          if (Test-Path $shaPath) { Remove-Item $shaPath -Force }

          New-Item -Path $packageDir -ItemType Directory -Force | Out-Null
          Copy-Item -Path (Join-Path $publishDir '*') -Destination $packageDir -Recurse -Force

          Compress-Archive -Path (Join-Path $packageDir '*') -DestinationPath $zipPath -Force

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $zipName = Split-Path -Leaf $zipPath
          Set-Content -Path $shaPath -Value "$hash  $zipName" -NoNewline -Encoding ascii

          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha_path=$shaPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.sha_path }}
          generate_release_notes: true